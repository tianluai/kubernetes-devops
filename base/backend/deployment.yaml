apiVersion: apps/v1
kind: Deployment
metadata:
  name: tianluai-api
  labels:
    app: tianluai-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: tianluai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tianluai-api
  template:
    metadata:
      labels:
        app: tianluai-api
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: api
          image: registry.digitalocean.com/tianluai/tianluai-api:latest
          ports:
            - containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: backend-config
          # Secret values are not in git — only wiring. CI syncs backend-secrets from GitHub Environment secrets.
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: MONGODB_URI
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AUTH_JWT_SECRET
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: SENTRY_DSN
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
      imagePullSecrets:
        - name: registry-tianluai
