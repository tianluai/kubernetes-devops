apiVersion: apps/v1
kind: Deployment
metadata:
  name: tianluai-api
  labels:
    app: tianluai-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: tianluai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tianluai-api
  template:
    metadata:
      labels:
        app: tianluai-api
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: api
          image: tianluai/tianluai-api:latest
          ports:
            - containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
      imagePullSecrets:
        - name: dockerhub-credentials
