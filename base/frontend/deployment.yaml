apiVersion: apps/v1
kind: Deployment
metadata:
  name: tianluai-web
  labels:
    app: tianluai-web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: tianluai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tianluai-web
  template:
    metadata:
      labels:
        app: tianluai-web
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: web
          image: tianluai/tianluai-web:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: frontend-config
            - secretRef:
                name: frontend-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
      imagePullSecrets:
        - name: dockerhub-credentials
