apiVersion: apps/v1
kind: Deployment
metadata:
  name: tianluai-web
  labels:
    app: tianluai-web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: tianluai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tianluai-web
  template:
    metadata:
      labels:
        app: tianluai-web
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: web
          image: registry.digitalocean.com/tianluai/tianluai-web:latest
          command: ["node"]
          args: ["server.js"]
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: frontend-config
          env:
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-secrets
                  key: AUTH_SECRET
            - name: AUTH_GOOGLE_ID
              valueFrom:
                secretKeyRef:
                  name: frontend-secrets
                  key: AUTH_GOOGLE_ID
            - name: AUTH_GOOGLE_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-secrets
                  key: AUTH_GOOGLE_SECRET
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-secrets
                  key: AUTH_JWT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 45
            timeoutSeconds: 5
            periodSeconds: 20
            failureThreshold: 6
      imagePullSecrets:
        - name: registry-tianluai
