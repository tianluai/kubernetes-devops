apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tianluai-prod

resources:
  - ../../base
  - namespace.yaml

# Secret payloads are not in this overlay; create backend-secrets / frontend-secrets separately (e.g. overlays/prod/*-secrets.example.yaml).
patches:
  - path: patches/backend-deployment.yaml
  - path: patches/frontend-deployment.yaml
  - path: patches/backend-config.yaml
  - path: patches/frontend-config.yaml
