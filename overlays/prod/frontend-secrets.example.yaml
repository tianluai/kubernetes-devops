# Copy to a file outside Git, fill values, then:
#   kubectl apply -f frontend-secrets.local.yaml -n tianluai-prod
apiVersion: v1
kind: Secret
metadata:
  name: frontend-secrets
  namespace: tianluai-prod
  labels:
    app: tianluai-web
    app.kubernetes.io/component: frontend
type: Opaque
stringData:
  CLERK_SECRET_KEY: "REPLACE_WITH_PROD_CLERK_SECRET_KEY"
