# Copy to a file outside Git, fill values, then:
#   kubectl apply -f frontend-secrets.local.yaml -n tianluai-prod
apiVersion: v1
kind: Secret
metadata:
  name: frontend-secrets
  namespace: tianluai-prod
  labels:
    app: tianluai-web
    app.kubernetes.io/component: frontend
type: Opaque
stringData:
  AUTH_SECRET: "REPLACE_WITH_PROD_AUTH_SECRET"
  AUTH_GOOGLE_ID: "REPLACE_WITH_PROD_AUTH_GOOGLE_ID"
  AUTH_GOOGLE_SECRET: "REPLACE_WITH_PROD_AUTH_GOOGLE_SECRET"
  AUTH_JWT_SECRET: "REPLACE_WITH_PROD_AUTH_JWT_SECRET"
