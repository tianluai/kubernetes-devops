# Copy to a file outside Git, fill values, then:
#   kubectl apply -f backend-secrets.local.yaml -n tianluai-prod
# MONGODB_URI must start with mongodb:// or mongodb+srv://
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: tianluai-prod
  labels:
    app: tianluai-api
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  MONGODB_URI: "REPLACE_WITH_PROD_MONGODB_URI"
  CLERK_SECRET_KEY: "REPLACE_WITH_PROD_CLERK_SECRET_KEY"
  SENTRY_DSN: ""
