apiVersion: apps/v1
kind: Deployment
metadata:
  name: tianluai-web
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    spec:
      containers:
        - name: web
          image: registry.digitalocean.com/tianluai/tianluai-web:0.1.33
          command: ["node"]
          args: ["server.js"]
          # $patch: replace — base may still define httpGet probes; merging would leave both httpGet + tcpSocket (invalid).
          readinessProbe:
            $patch: replace
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            $patch: replace
            tcpSocket:
              port: 3000
            initialDelaySeconds: 45
            timeoutSeconds: 5
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 384Mi
