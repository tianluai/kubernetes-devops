# Set MONGODB_URI to your Atlas URI (must start with mongodb:// or mongodb+srv://). Apply: kubectl apply -k overlays/prod
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
type: Opaque
stringData:
  MONGODB_URI: "REPLACE_WITH_PROD_MONGODB_URI"
  CLERK_SECRET_KEY: "REPLACE_WITH_PROD_CLERK_SECRET_KEY"
  CORS_ORIGIN: "https://ai.tianlu.tech"
