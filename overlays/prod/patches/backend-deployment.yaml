apiVersion: apps/v1
kind: Deployment
metadata:
  name: tianluai-api
spec:
  # Single small node: keep 1 replica; raise after adding nodes / larger pool
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    spec:
      containers:
        - name: api
          image: registry.digitalocean.com/tianluai/tianluai-api:0.0.43
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 384Mi
