apiVersion: apps/v1
kind: Deployment
metadata:
  name: tianluai-api
spec:
  # replicas: raise to 2+ for HA when the pool allows. Rollouts use surge 1 — brief 2-pod overlap per deployment.
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    spec:
      containers:
        - name: api
          image: registry.digitalocean.com/tianluai/tianluai-api:0.0.43
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 384Mi
