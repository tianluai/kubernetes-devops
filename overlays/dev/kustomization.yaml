apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tianluai-dev

resources:
  - ../../base
  - namespace.yaml

patches:
  - path: patches/backend-deployment.yaml
  - path: patches/frontend-deployment.yaml
  - path: patches/backend-config.yaml
  - path: patches/frontend-config.yaml
  - path: patches/backend-secrets.yaml
  - path: patches/frontend-secrets.yaml
