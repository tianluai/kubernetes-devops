apiVersion: apps/v1
kind: Deployment
metadata:
  name: tianluai-api
spec:
  replicas: 1
  # Single-node / tight CPU: never run two API pods during a rollout (avoids 2× scheduling).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    spec:
      containers:
        - name: api
          image: registry.digitalocean.com/tianluai/tianluai-api:latest
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 384Mi
