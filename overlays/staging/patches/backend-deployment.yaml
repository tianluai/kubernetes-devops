apiVersion: apps/v1
kind: Deployment
metadata:
  name: tianluai-api
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: api
          image: tianluai/tianluai-api:staging
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
