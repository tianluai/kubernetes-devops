apiVersion: apps/v1
kind: Deployment
metadata:
  name: tianluai-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          image: registry.digitalocean.com/tianluai/tianluai-api:latest
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
