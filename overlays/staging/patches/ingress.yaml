apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tianluai-ingress
spec:
  tls:
    - hosts:
        - ai-staging.tianlu.tech
        - ai-api-staging.tianlu.tech
      secretName: tianluai-tls
  rules:
    - host: ai-staging.tianlu.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tianluai-web
                port:
                  number: 80
    - host: ai-api-staging.tianlu.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tianluai-api
                port:
                  number: 80
