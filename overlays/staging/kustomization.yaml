apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tianluai-staging

resources:
  - ../../base
  - namespace.yaml

# Secret payloads are not in this overlay; create backend-secrets / frontend-secrets separately.
patches:
  - path: patches/backend-deployment.yaml
  - path: patches/frontend-deployment.yaml
  - path: patches/backend-config.yaml
  - path: patches/frontend-config.yaml
  - path: patches/ingress.yaml
