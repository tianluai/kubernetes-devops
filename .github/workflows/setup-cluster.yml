name: Setup cluster

on:
  workflow_dispatch:
    inputs:
      action:
        required: true
        type: choice
        options:
          - install-ingress
          - docr-pull-secret
          - full

env:
  CLUSTER_NAME: tianlu-k8s
  INGRESS_URL: https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.12.0/deploy/static/provider/do/deploy.yaml

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }}
      - uses: azure/setup-kubectl@v4

      - name: Ingress
        if: inputs.action == 'install-ingress' || inputs.action == 'full'
        run: |
          kubectl apply -f "${{ env.INGRESS_URL }}"
          kubectl wait -n ingress-nginx --for=condition=ready pod -l app.kubernetes.io/component=controller --timeout=300s
          kubectl get svc -n ingress-nginx ingress-nginx-controller -o wide

      - name: DOCR pull secret
        if: inputs.action == 'docr-pull-secret' || inputs.action == 'full'
        env:
          REGISTRY_NAME: ${{ secrets.DOCR_REGISTRY_NAME }}
        run: |
          for NS in tianluai-dev tianluai-staging tianluai-prod; do
            kubectl create namespace ${NS} --dry-run=client -o yaml | kubectl apply -f -
            doctl registry kubernetes-manifest "${REGISTRY_NAME}" --namespace "${NS}" | kubectl apply -f -
          done
