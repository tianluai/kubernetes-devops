name: Setup Cluster Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - setup-docker-secret
          - full-setup

env:
  DIGITALOCEAN_CLUSTER_NAME: tianluai-k8s

jobs:
  setup:
    name: Setup - ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save ${{ env.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Create Docker Hub secret in all namespaces
        run: |
          for NS in tianluai-dev tianluai-staging tianluai-prod; do
            kubectl create namespace ${NS} --dry-run=client -o yaml | kubectl apply -f -
            kubectl create secret docker-registry dockerhub-credentials \
              --docker-server=https://index.docker.io/v1/ \
              --docker-username=${{ secrets.DOCKERHUB_USERNAME }} \
              --docker-password=${{ secrets.DOCKERHUB_TOKEN }} \
              --namespace=${NS} \
              --dry-run=client -o yaml | kubectl apply -f -
          done
