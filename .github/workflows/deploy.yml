name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "base/**"
      - "overlays/**"

  repository_dispatch:
    types: [deploy-backend, deploy-frontend]

  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options: [dev, staging, prod]

permissions:
  contents: write

env:
  CLUSTER_NAME: tianlu-k8s

concurrency:
  group: ${{ github.event_name == 'repository_dispatch' && 'manifest-apply' || github.run_id }}
  cancel-in-progress: false

jobs:
  validate:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && !contains(github.event.head_commit.message || '', '[skip ci]'))
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [staging, prod]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - run: kubectl kustomize overlays/${{ matrix.env }} | kubectl apply --dry-run=client --validate=false -f -

  dispatch-deploy:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.client_payload.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_DEVOPS_TOKEN }}
          fetch-depth: 0

      - name: Update image in overlay
        env:
          ENV: ${{ github.event.client_payload.environment }}
          IMAGE: ${{ github.event.client_payload.image }}
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          if [[ "${{ github.event.action }}" == "deploy-backend" ]]; then
            export FILE="overlays/${ENV}/patches/backend-deployment.yaml"
          else
            export FILE="overlays/${ENV}/patches/frontend-deployment.yaml"
          fi
          python3 << 'PY'
          import os, re, pathlib
          path = pathlib.Path(os.environ["FILE"])
          img = os.environ["IMAGE"] + ":" + os.environ["TAG"]
          text = path.read_text()
          text = re.sub(r"^(\s*)image:\s.*$", r"\1image: " + img, text, flags=re.M)
          path.write_text(text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git diff --staged --quiet || git commit -m "chore: image $(basename "$IMAGE"):${TAG} (${ENV}) [skip ci]"
          git push

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }}

      - uses: azure/setup-kubectl@v4

      - name: Apply to cluster
        env:
          ENV: ${{ github.event.client_payload.environment }}
        run: |
          kubectl kustomize overlays/${ENV} | kubectl apply -f -
          NS="tianluai-${ENV}"
          kubectl rollout status deployment/tianluai-api -n ${NS} --timeout=300s
          kubectl rollout status deployment/tianluai-web -n ${NS} --timeout=300s

  manual-deploy:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }}
      - uses: azure/setup-kubectl@v4
      - run: kubectl kustomize overlays/${{ github.event.inputs.environment }} | kubectl apply -f -
      - run: |
          NS=tianluai-${{ github.event.inputs.environment }}
          kubectl rollout status deployment/tianluai-api -n ${NS} --timeout=300s
          kubectl rollout status deployment/tianluai-web -n ${NS} --timeout=300s
