name: Deploy to Kubernetes

on:
  push:
    branches: [main]
    paths:
      - "base/**"
      - "overlays/**"

  repository_dispatch:
    types: [deploy-backend, deploy-frontend]

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  DIGITALOCEAN_CLUSTER_NAME: tianluai-k8s

jobs:
  # ── Validate Manifests ──
  validate:
    name: Validate Manifests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate with kustomize
        run: kubectl kustomize overlays/${{ matrix.environment }} > /dev/null

      - name: Dry-run manifests
        run: |
          kubectl kustomize overlays/${{ matrix.environment }} | \
            kubectl apply --dry-run=client -f -

  # ── Update Image Tag (from repository_dispatch) ──
  update-image:
    name: Update Image Tag
    runs-on: ubuntu-latest
    if: github.event_name == 'repository_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine component
        id: component
        run: |
          if [[ "${{ github.event.action }}" == "deploy-backend" ]]; then
            echo "name=api" >> $GITHUB_OUTPUT
            echo "file=backend-deployment.yaml" >> $GITHUB_OUTPUT
          else
            echo "name=web" >> $GITHUB_OUTPUT
            echo "file=frontend-deployment.yaml" >> $GITHUB_OUTPUT
          fi

      - name: Update image tag in overlay
        run: |
          ENV="${{ github.event.client_payload.environment }}"
          IMAGE="${{ github.event.client_payload.image }}"
          TAG="${{ github.event.client_payload.tag }}"
          FILE="overlays/${ENV}/patches/${{ steps.component.outputs.file }}"

          sed -i "s|image: .*|image: ${IMAGE}:${TAG}|" "${FILE}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: update ${{ steps.component.outputs.name }} image to ${{ github.event.client_payload.tag }} (${{ github.event.client_payload.environment }})"
          git push

  # ── Deploy to Cluster ──
  deploy:
    name: Deploy to ${{ matrix.environment }}
    runs-on: ubuntu-latest
    needs: [validate]
    if: |
      always() &&
      needs.validate.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    strategy:
      matrix:
        environment:
          - ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}
    environment: ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save ${{ env.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Apply manifests
        run: kubectl kustomize overlays/${{ matrix.environment }} | kubectl apply -f -

      - name: Wait for rollout
        run: |
          NS="tianluai-${{ matrix.environment }}"
          PREFIX="${{ matrix.environment }}-"
          kubectl rollout status deployment/${PREFIX}tianluai-api -n ${NS} --timeout=300s
          kubectl rollout status deployment/${PREFIX}tianluai-web -n ${NS} --timeout=300s

      - name: Verify pods
        run: |
          NS="tianluai-${{ matrix.environment }}"
          kubectl get pods -n ${NS}
          kubectl get svc -n ${NS}

  # ── Deploy from dispatch (after image update) ──
  deploy-dispatch:
    name: Deploy (${{ github.event.client_payload.environment }})
    runs-on: ubuntu-latest
    needs: [update-image]
    if: github.event_name == 'repository_dispatch'
    environment: ${{ github.event.client_payload.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save ${{ env.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Apply manifests
        run: |
          ENV="${{ github.event.client_payload.environment }}"
          kubectl kustomize overlays/${ENV} | kubectl apply -f -

      - name: Wait for rollout
        run: |
          ENV="${{ github.event.client_payload.environment }}"
          NS="tianluai-${ENV}"
          PREFIX="${ENV}-"
          kubectl rollout status deployment/${PREFIX}tianluai-api -n ${NS} --timeout=300s || true
          kubectl rollout status deployment/${PREFIX}tianluai-web -n ${NS} --timeout=300s || true

  # ── Notify on Failure ──
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy, deploy-dispatch]
    if: failure()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Deployment failed for tianluai (${{ github.event_name }})",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Deployment Failed*\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View>"
                  }
                }
              ]
            }
