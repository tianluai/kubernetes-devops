name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "base/**"
      - "overlays/**"
      - ".github/workflows/**"
      - "scripts/**"
  push:
    branches: [main]
    paths:
      - "base/**"
      - "overlays/**"
      - ".github/workflows/**"
      - "scripts/**"

permissions:
  contents: read

jobs:
  validate:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && !contains(github.event.head_commit.message || '', '[skip ci]'))
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [staging, prod]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Kustomize build
        run: kubectl kustomize overlays/${{ matrix.env }} >/dev/null
